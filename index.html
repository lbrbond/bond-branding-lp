  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

t:1px; background:var(--gold); }\n.doc-title { font-family:var(--mincho); font-size:clamp(20px,4.5vw,30px); color:var(--navy); font-weight:700; line-height:1.55; margin-bottom:18px; }\n.doc-title .hl { color:var(--gold); border-bottom:1px solid var(--gold); padding-bottom:2px; }\n.doc-intro { font-size:14px; color:var(--ink-s); line-height:2; margin-bottom:26px; padding-bottom:22px; border-bottom:1px dashed var(--border); }\n.doc-intro strong { color:var(--navy); font-weight:600; }\n.doc-section-lbl { font-family:var(--mincho); font-size:14px; color:var(--navy); font-weight:700; display:flex; align-items:center; gap:9px; margin-bottom:14px; }\n.doc-section-lbl::before { content:''; width:14px; height:2px; background:var(--gold); }\n.doc-points { list-style:none; counter-reset:dpc; display:flex; flex-direction:column; gap:10px; margin-bottom:22px; }\n.doc-points li { padding:13px 16px 13px 42px; position:relative; background:white; border:1px solid var(--border); font-family:var(--mincho); font-size:13px; color:var(--navy); font-weight:500; line-height:1.7; counter-increment:dpc; }\n.doc-points li::before { content:counter(dpc,decimal-leading-zero); position:absolute; left:13px; top:13px; font-family:var(--en); font-size:11px; color:var(--gold); font-style:italic; font-weight:600; }\n.doc-note { padding:14px 17px; background:var(--navy); color:var(--cream); font-size:13px; line-height:1.85; display:flex; gap:11px; align-items:flex-start; margin-bottom:22px; }\n.doc-note-i { color:var(--gold); font-family:var(--en); font-size:17px; font-style:italic; flex-shrink:0; line-height:1; margin-top:2px; }\n.doc-cta-wrap { display:flex; flex-direction:column; gap:8px; }\n.btn-navy { padding:20px 32px; background:var(--navy); color:var(--cream); text-decoration:none; font-weight:700; letter-spacing:.1em; font-size:14px; display:inline-flex; align-items:center; justify-content:center; gap:10px; border:1px solid var(--navy); transition:all .22s; }\n.btn-navy:hover { background:var(--gold); border-color:var(--gold); color:var(--navy); }\n.doc-cta-note { font-size:11px; color:var(--ink-m); text-align:center; letter-spacing:.05em; }\n\n/* ── FORM ── */\n.form-sec { padding:88px 24px 130px; background:var(--paper); }\n.form-box { max-width:660px; margin:0 auto; background:white; border:1px solid var(--border); padding:40px 28px; }\n.form-hd { text-align:center; margin-bottom:30px; padding-bottom:26px; border-bottom:1px solid var(--border); }\n.form-eye { font-family:var(--en); color:var(--gold); font-size:10px; letter-spacing:.32em; text-transform:uppercase; margin-bottom:11px; }\n.form-title { font-family:var(--mincho); font-size:clamp(19px,4.5vw,26px); color:var(--navy); font-weight:700; line-height:1.6; margin-bottom:7px; }\n.form-sub { font-size:13px; color:var(--ink-s); line-height:1.8; }\n.f-row { margin-bottom:18px; }\n.f-label { display:block; font-family:var(--mincho); font-size:13px; color:var(--navy); font-weight:600; margin-bottom:7px; }\n.f-label .req { font-size:9px; color:white; background:var(--red); padding:2px 6px; margin-left:7px; font-weight:500; }\n.f-label .opt { font-size:9px; color:var(--ink-m); background:var(--cream); padding:2px 6px; margin-left:7px; }\n.f-input, .f-textarea { width:100%; padding:13px 14px; border:1px solid var(--border); background:var(--paper); font-size:14px; color:var(--ink); font-family:var(--gothic); transition:border-color .22s, background .22s; }\n.f-input:focus, .f-textarea:focus { outline:none; border-color:var(--gold); background:white; }\n.f-textarea { min-height:96px; resize:vertical; line-height:1.7; }\n.f-submit { width:100%; padding:21px; background:var(--navy); color:var(--cream); border:none; font-family:var(--mincho); font-size:15px; font-weight:700; letter-spacing:.1em; cursor:pointer; margin-top:6px; transition:background .22s; }\n.f-submit:hover { background:var(--gold); color:var(--navy); }\n.f-privacy { font-size:11px; color:var(--ink-m); text-align:center; margin-top:13px; line-height:1.7; }\n.f-privacy a { color:var(--navy-l); text-decoration:underline; }\n.f-success { display:none; text-align:center; padding:40px 0; }\n.f-success.show { display:block; }\n.f-success-icon { width:48px; height:48px; margin:0 auto 16px; border:2px solid var(--gold); border-radius:50%; display:flex; align-items:center; justify-content:center; color:var(--gold); font-family:var(--en); font-size:22px; }\n.f-success-title { font-family:var(--mincho); font-size:20px; color:var(--navy); font-weight:700; margin-bottom:10px; }\n.f-success-text { font-size:14px; color:var(--ink-s); line-height:1.9; }\n\n/* ── FOOTER / MOB CTA ── */\n.footer { background:var(--navy); color:rgba(247,243,236,.4); padding:30px 24px 110px; text-align:center; font-family:var(--en); font-size:10px; letter-spacing:.18em; }\n.mob-cta { position:fixed; bottom:0; left:0; right:0; z-index:90; background:rgba(10,22,40,.97); backdrop-filter:blur(14px); padding:11px 16px; border-top:1px solid rgba(201,169,97,.22); }\n.mob-cta a { display:block; width:100%; padding:15px; text-align:center; background:var(--gold); color:var(--navy); text-decoration:none; font-size:14px; font-weight:700; letter-spacing:.07em; }\n\n@keyframes fadeUp { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:none} }\n@keyframes fadeIn { from{opacity:0} to{opacity:1} }\n\n@media(min-width:640px){\n  .nav { padding:16px 36px; }\n  .hero { padding:128px 36px 88px; }\n  .problems,.why,.solution,.services,.scene-sec,.benefit-sec,.cases,.doc-req,.form-sec { padding:110px 36px; }\n  .form-sec { padding-bottom:130px; }\n  .svc-grid { grid-template-columns:repeat(2,1fr); }\n  .why-grid { grid-template-columns:1fr 1fr; }\n  .benefit-cards { grid-template-columns:repeat(3,1fr); }\n  .cases-grid { grid-template-columns:1fr 1fr; }\n  .mob-cta { display:none; }\n  .footer { padding:36px 36px 40px; }\n  .hero-cta-group { max-width:340px; }\n  .doc-req-inner { grid-template-columns:0.9fr 1.1fr; }\n  .scene-inner { grid-template-columns:1fr 1fr; gap:52px; }\n}\n@media(min-width:1024px){\n  .nav { padding:18px 52px; }\n  .hero { padding:148px 52px 110px; }\n  .hero-inner { grid-template-columns:1.1fr 1fr; gap:68px; align-items:center; }\n  .problems,.why,.solution,.services,.scene-sec,.benefit-sec,.cases,.doc-req,.form-sec { padding:130px 52px; }\n  .form-sec { padding-bottom:160px; }\n  .svc-card { padding:40px 32px; }\n  .cases-grid { grid-template-columns:repeat(3,1fr); gap:20px; }\n}\n<\/style>\n\n<\/head>\n<body>\n\n<!-- ── NAV ── -->\n<nav class=\"nav\">\n  <a href=\"#\" class=\"nav-brand\">\n    <img src=\"9ab0d6d4-675d-40a2-a8be-44209fc79ff6\" alt=\"LBR\" class=\"nav-logo-img\">\n    <div>\n      <span class=\"nav-brand-text\">BOND TAILOR<\/span>\n      <span class=\"nav-brand-sub\">ORG × BRANDING<\/span>\n    <\/div>\n  <\/a>\n  <a href=\"#form\" class=\"nav-cta\">資料を受け取る<\/a>\n<\/nav>\n\n<!-- ── HERO ── -->\n<section class=\"hero\">\n  <div class=\"hero-inner\">\n    <div class=\"hero-content\">\n      <div class=\"hero-eyebrow\"><span class=\"dot\"><\/span>ORG × CORPORATE BRANDING<\/div>\n      <h1 class=\"hero-title\">\n        社員の見た目を整え、<br>\n        <span class=\"accent\">組織力<\/span>と<br>\n        <span class=\"accent\">企業価値<\/span>を高める。\n      <\/h1>\n      <p class=\"hero-sub\">\n        組織改善と企業ブランディングを<br>\n        同時に進める、法人向け統合プログラム。\n      <\/p>\n      <div class=\"hero-doc-line\">\n        <div class=\"hero-doc-line-label\">Free Document<\/div>\n        <div class=\"hero-doc-line-text\">\n          統一感・基準づくり・企業印象を同時に整えるための<br>資料を無料でお送りします。\n        <\/div>\n      <\/div>\n      <div class=\"hero-cta-group\">\n        <a href=\"#form\" class=\"btn-gold\">資料を受け取る →<\/a>\n        <p class=\"btn-note\">フォーム送信後、自動返信メールで資料をお届け<\/p>\n      <\/div>\n    <\/div>\n    <div class=\"hero-image\">\n      <img src=\"0569475d-0fd8-409b-8019-585af7ae7a14\" alt=\"統一感ある経営・管理職チーム\">\n    <\/div>\n  <\/div>\n<\/section>\n\n<!-- ── PROBLEMS ── -->\n<section class=\"problems\">\n  <div class=\"s-wrap\">\n    <div class=\"prob-head rv\">\n      <span class=\"s-eye\">Organizational Challenges<\/span>\n      <h2 class=\"s-title\" style=\"margin-top:4px\">こんな経営課題、<br>ありませんか？<\/h2>\n    <\/div>\n    <div class=\"prob-list\">\n      <div class=\"prob-row rv\"><div class=\"prob-num\">01<\/div><div class=\"prob-text\">社員に覇気がなく、社内の空気が重い<\/div><\/div>\n      <div class=\"prob-row rv\"><div class=\"prob-num\">02<\/div><div class=\"prob-text\">服装や身だしなみの基準が曖昧で、統一感がない<\/div><\/div>\n      <div class=\"prob-row rv\"><div class=\"prob-num\">03<\/div><div class=\"prob-text\">会社の印象が弱く、競合より見劣りする<\/div><\/div>\n      <div class=\"prob-row rv\"><div class=\"prob-num\">04<\/div><div class=\"prob-text\">福利厚生が、文化やブランド資産になっていない<\/div><\/div>\n    <\/div>\n  <\/div>\n<\/section>\n\n<!-- ── WHY ── -->\n<section class=\"why\">\n  <div class=\"s-wrap\">\n    <div class=\"why-head rv\">\n      <span class=\"s-eye\">Why Appearance Matters<\/span>\n      <h2 class=\"s-title\" style=\"margin-top:4px\">見た目への投資が、<br>組織とブランドに効く理由<\/h2>\n    <\/div>\n    <div class=\"why-lead rv\">\n      <p class=\"why-lead-text\">\n        社員の見た目は、単なる服装ではありません。<br>\n        <span class=\"hl\">組織の基準であり、企業の資産<\/span>です。\n      <\/p>\n    <\/div>\n    <div class=\"why-grid\">\n      <div class=\"why-axis rv\">\n        <div class=\"why-axis-header\">\n          <div class=\"why-axis-num\">01<\/div>\n          <div class=\"why-axis-label\">Internal — 組織改善<\/div>\n        <\/div>\n        <h3 class=\"why-axis-title\">社内には<br><span class=\"hl\">基準・統一感・帰属意識<\/span>を<\/h3>\n        <ul class=\"why-items\">\n          <li>服装の基準が、行動の基準を生む<\/li>\n          <li>統一感が、組織の一体感をつくる<\/li>\n          <li>揃えられた装いが、帰属意識を育てる<\/li>\n          <li>見た目への投資が、社員への敬意になる<\/li>\n        <\/ul>\n      <\/div>\n      <div class=\"why-axis rv\">\n        <div class=\"why-axis-header\">\n          <div class=\"why-axis-num\">02<\/div>\n          <div class=\"why-axis-label\">External — ブランド向上<\/div>\n        <\/div>\n        <h3 class=\"why-axis-title\">社外には<br><span class=\"hl\">信頼・企業価値・競争力<\/span>を<\/h3>\n        <ul class=\"why-items\">\n          <li>第一印象が、取引・採用の成果を左右する<\/li>\n          <li>統一された見た目が、企業価値を押し上げる<\/li>\n          <li>印象の積み重ねが、ブランドの輪郭をつくる<\/li>\n          <li>見た目の差が、競合との差別化になる<\/li>\n        <\/ul>\n      <\/div>\n    <\/div>\n    <div class=\"why-conclusion rv\">\n      <div class=\"why-conclusion-label\">Conclusion<\/div>\n      <p class=\"why-conclusion-text\">\n        見た目への投資は、<br>\n        <span class=\"hl\">組織改善と企業ブランディング<\/span>を<br>\n        同時に進める施策です。\n      <\/p>\n    <\/div>\n  <\/div>\n<\/section>\n\n<!-- ── SOLUTION ── -->\n<section class=\"solution\">\n  <div class=\"sol-inner\">\n    <span class=\"sol-eye rv\">Our Approach<\/span>\n    <h2 class=\"sol-punch rv\">\n      <span class=\"hl\">組織改善と企業価値向上<\/span>を、<br>同時に進める。\n    <\/h2>\n    <p class=\"sol-body rv\">\n      役員・管理職・社員の見た目を設計し、<br>\n      清潔感・統一感・信頼感を仕組み化することで、<br>\n      社内の空気と社外の印象を同時に改善します。\n    <\/p>\n    <div class=\"flow-row rv\">\n      <div class=\"flow-chip\">基準づくり<\/div>\n      <div class=\"flow-arr\">→<\/div>\n      <div class=\"flow-chip\">統一感<\/div>\n      <div class=\"flow-arr\">→<\/div>\n      <div class=\"flow-chip\">企業価値<\/div>\n    <\/div>\n  <\/div>\n<\/section>\n\n<!-- ── SERVICES ── -->\n<section class=\"services\">\n  <div class=\"s-wrap\">\n    <div class=\"svc-head rv\">\n      <span class=\"s-eye\">Services<\/span>\n      <h2 class=\"s-title\" style=\"margin-top:4px\">サービス内容<\/h2>\n    <\/div>\n    <div class=\"svc-grid\">\n      <div class=\"svc-card rv\">\n        <div class=\"svc-head-row\">\n          <div class=\"svc-num\">SERVICE / 01<\/div>\n          <svg class=\"svc-icon\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.3\"><circle cx=\"12\" cy=\"8\" r=\"4\"><\/circle><path d=\"M4 21v-2a4 4 0 014-4h8a4 4 0 014 4v2\"><\/path><\/svg>\n        <\/div>\n        <h3 class=\"svc-name\">役員・管理職の印象改善<\/h3>\n        <p class=\"svc-desc\">経営層・管理職の装いと所作が、組織文化の手本になります。リーダー層の見た目を起点に、組織全体の基準をつくります。<\/p>\n      <\/div>\n      <div class=\"svc-card rv\">\n        <div class=\"svc-head-row\">\n          <div class=\"svc-num\">SERVICE / 02<\/div>\n          <svg class=\"svc-icon\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.3\"><rect x=\"3\" y=\"3\" width=\"7\" height=\"7\"><\/rect><rect x=\"14\" y=\"3\" width=\"7\" height=\"7\"><\/rect><rect x=\"14\" y=\"14\" width=\"7\" height=\"7\"><\/rect><rect x=\"3\" y=\"14\" width=\"7\" height=\"7\"><\/rect><\/svg>\n        <\/div>\n        <h3 class=\"svc-name\">社員の基準づくり<\/h3>\n        <p class=\"svc-desc\">曖昧な服装ルールを明文化し、組織の基準として機能する身だしなみを設計。統一感と帰属意識を生みます。<\/p>\n      <\/div>\n      <div class=\"svc-card rv\">\n        <div class=\"svc-head-row\">\n          <div class=\"svc-num\">SERVICE / 03<\/div>\n          <svg class=\"svc-icon\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.3\"><path d=\"M3 21h18M5 21V7l8-4v18M19 21V11l-6-4\"><\/path><\/svg>\n        <\/div>\n        <h3 class=\"svc-name\">外部印象の統一<\/h3>\n        <p class=\"svc-desc\">採用・営業・広報でバラバラな見え方を統合し、企業ブランドと連動した一貫性ある外部印象を設計します。<\/p>\n      <\/div>\n      <div class=\"svc-card rv\">\n        <div class=\"svc-head-row\">\n          <div class=\"svc-num\">SERVICE / 04<\/div>\n          <svg class=\"svc-icon\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.3\"><path d=\"M20.38 3.46L16 2a4 4 0 01-8 0L3.62 3.46a2 2 0 00-1.34 2.23l.58 3.47a1 1 0 00.99.84H6v10c0 1.1.9 2 2 2h8a2 2 0 002-2V10h2.15a1 1 0 00.99-.84l.58-3.47a2 2 0 00-1.34-2.23z\"><\/path><\/svg>\n        <\/div>\n        <h3 class=\"svc-name\">法人向けオーダースーツ導入<\/h3>\n        <p class=\"svc-desc\">企業の世界観を体現する一着を、役職別に設計。採寸から仕立てまで専任チームが一貫対応します。<\/p>\n      <\/div>\n    <\/div>\n  <\/div>\n<\/section>\n\n<!-- ── 組織改善セクション ── -->\n<section class=\"scene-sec\" style=\"background:var(--paper)\">\n  <div class=\"scene-inner s-wrap\">\n    <div class=\"scene-img rv\">\n      <img src=\"b0de7c53-d025-446e-9b05-4d2ba091243d\" alt=\"管理職・役員の会議シーン\">\n    <\/div>\n    <div class=\"rv\">\n      <div class=\"scene-eye\">Internal Value<\/div>\n      <h3 class=\"scene-title\">\n        社内に、<span class=\"hl\">基準と統一感<\/span>を<br>つくる。\n      <\/h3>\n      <p class=\"scene-text\">\n        曖昧だった服装ルール、バラバラな管理職の装い、温度差のある社員—<br>\n        <strong>見た目の基準<\/strong>を明確にすることが、組織の一体感と帰属意識を生みます。\n      <\/p>\n      <p class=\"scene-text\">「服装を揃える」ではなく、<strong>「組織の基準をつくる」<\/strong>という視点で設計します。<\/p>\n      <ul class=\"scene-list\">\n        <li>役員・管理職を起点にした基準設計<\/li>\n        <li>ドレスコードの明文化と全社展開<\/li>\n        <li>統一感から生まれる組織の一体感<\/li>\n      <\/ul>\n    <\/div>\n  <\/div>\n<\/section>\n\n<!-- ── 企業ブランディングセクション ── -->\n<section class=\"scene-sec\" style=\"background:var(--cream)\">\n  <div class=\"scene-inner s-wrap\" style=\"direction:ltr\">\n    <div class=\"rv\" style=\"order:1\">\n      <div class=\"scene-eye\">External Value<\/div>\n      <h3 class=\"scene-title\">\n        社外に、<span class=\"hl\">信頼と企業価値<\/span>を<br>届ける。\n      <\/h3>\n      <p class=\"scene-text\">\n        採用・営業・広報—社外のあらゆる接点で、<strong>統一された見た目<\/strong>が企業価値を押し上げます。<br>\n        「ちゃんとしている会社」として伝わる印象を、戦略的に設計します。\n      <\/p>\n      <ul class=\"scene-list\">\n        <li>役員・管理職・社員の装いを企業ブランドと連動<\/li>\n        <li>採用/営業/広報の見え方を統合<\/li>\n        <li>競合との差別化を\"見た目\"で実現<\/li>\n      <\/ul>\n    <\/div>\n    <div class=\"scene-img rv\" style=\"order:2\">\n      <img src=\"64d395c7-db8b-4e54-ac29-8bb76f618c36\" alt=\"統一感ある企業イメージ — ブランディング\">\n    <\/div>\n  <\/div>\n<\/section>\n\n<!-- ── 福利厚生 ── -->\n<section class=\"benefit-sec\">\n  <div class=\"benefit-inner\">\n    <span class=\"sol-eye rv\">Benefit × Culture<\/span>\n    <h2 class=\"benefit-title rv\">\n      福利厚生を、<span class=\"hl\">文化と<br>ブランド資産<\/span>に変える。\n    <\/h2>\n    <p class=\"benefit-body rv\">\n      スーツ補助や身だしなみ支援を福利厚生として導入することで、<br>\n      <strong>「社員に投資する会社」<\/strong>という文化を社内外に伝えられます。<br>\n      単なる制度ではなく、組織改善と企業ブランディングを支える仕組みとして設計します。\n    <\/p>\n    <div class=\"benefit-cards rv\">\n      <div class=\"benefit-card\">\n        <div class=\"benefit-card-label\">Culture<\/div>\n        <div class=\"benefit-card-title\">社内文化への定着<\/div>\n        <div class=\"benefit-card-text\">入社時スーツ支援・スーツ補助を制度化し、「社員を大切にする会社」として社内に根づかせる<\/div>\n      <\/div>\n      <div class=\"benefit-card\">\n        <div class=\"benefit-card-label\">Brand Asset<\/div>\n        <div class=\"benefit-card-title\">ブランド資産化<\/div>\n        <div class=\"benefit-card-text\">身だしなみ支援の実施を採用・広報に活用し、外部への「見せ方」に変える<\/div>\n      <\/div>\n      <div class=\"benefit-card\">\n        <div class=\"benefit-card-label\">Investment<\/div>\n        <div class=\"benefit-card-title\">社員投資の可視化<\/div>\n        <div class=\"benefit-card-text\">福利厚生の内容を求人票・採用LPで訴求し、「選ばれる会社」の差別化要素として機能させる<\/div>\n      <\/div>\n    <\/div>\n  <\/div>\n<\/section>\n\n<!-- ── CASES ── -->\n<section class=\"cases\">\n  <div class=\"s-wrap\">\n    <div class=\"cases-head rv\">\n      <span class=\"s-eye\" style=\"color:var(--gold)\">Case Studies<\/span>\n      <h2 class=\"s-title\" style=\"color:var(--cream);margin-top:4px\">導入事例<\/h2>\n    <\/div>\n    <div class=\"cases-grid\">\n      <div class=\"case-card rv\">\n        <div class=\"case-hd\">\n          <div><div class=\"case-company\">A社<\/div><div class=\"case-industry\">PROFESSIONAL SERVICES<\/div><\/div>\n          <div class=\"case-emp\">EMP / 150<\/div>\n        <\/div>\n        <div class=\"case-row\">\n          <div class=\"case-label\">Challenge<\/div>\n          <div class=\"case-content\">管理職の服装のバラつきが組織の基準の曖昧さに直結していた<\/div>\n        <\/div>\n        <div class=\"case-row\">\n          <div class=\"case-label\">Solution<\/div>\n          <div class=\"case-content\">管理職を起点にした身だしなみ基準を設計し全社展開<\/div>\n        <\/div>\n        <div class=\"case-result\">\n          <div class=\"case-label\">Result<\/div>\n          <div class=\"case-content\">管理職の印象統一により、社内基準が明確化。社員の帰属意識と上長への信頼感が向上。<\/div>\n        <\/div>\n      <\/div>\n      <div class=\"case-card rv\">\n        <div class=\"case-hd\">\n          <div><div class=\"case-company\">B社<\/div><div class=\"case-industry\">IT / SaaS<\/div><\/div>\n          <div class=\"case-emp\">EMP / 220<\/div>\n        <\/div>\n        <div class=\"case-row\">\n          <div class=\"case-label\">Challenge<\/div>\n          <div class=\"case-content\">福利厚生を手厚くしても、社員満足度や採用力に反映されない状況が続いていた<\/div>\n        <\/div>\n        <div class=\"case-row\">\n          <div class=\"case-label\">Solution<\/div>\n          <div class=\"case-content\">スーツ補助・身だしなみ支援を福利厚生として制度化し採用広報にも活用<\/div>\n        <\/div>\n        <div class=\"case-result\">\n          <div class=\"case-label\">Result<\/div>\n          <div class=\"case-content\">「社員に投資する会社」として定着し、採用候補者からの評価が向上。内定承諾率が改善。<\/div>\n        <\/div>\n      <\/div>\n      <div class=\"case-card rv\">\n        <div class=\"case-hd\">\n          <div><div class=\"case-company\">C社<\/div><div class=\"case-industry\">FINANCE<\/div><\/div>\n          <div class=\"case-emp\">EMP / 400<\/div>\n        <\/div>\n        <div class=\"case-row\">\n          <div class=\"case-label\">Challenge<\/div>\n          <div class=\"case-content\">採用・営業・広報で見せ方がバラバラで一貫した企業印象が伝わらなかった<\/div>\n        <\/div>\n        <div class=\"case-row\">\n          <div class=\"case-label\">Solution<\/div>\n          <div class=\"case-content\">企業ブランドと連動した見た目設計を全部門に導入し外部印象を統合<\/div>\n        <\/div>\n        <div class=\"case-result\">\n          <div class=\"case-label\">Result<\/div>\n          <div class=\"case-content\">外部印象が統一され、採用面接・営業商談の両面で「信頼感のある会社」としての評価が向上。<\/div>\n        <\/div>\n      <\/div>\n    <\/div>\n  <\/div>\n<\/section>\n\n<!-- ── DOC REQUEST ★最重要 ── -->\n<section class=\"doc-req\" id=\"doc\">\n  <div class=\"doc-req-inner\">\n    <div class=\"doc-image-col rv\">\n      <div class=\"doc-scene\">\n        <img src=\"0569475d-0fd8-409b-8019-585af7ae7a14\" alt=\"統一感ある組織チーム\">\n      <\/div>\n      <div class=\"doc-preview\">\n        <div class=\"doc-preview-hd\">\n          <div class=\"doc-preview-brand\">BOND TAILOR / ORG × BRANDING<\/div>\n          <div class=\"doc-preview-title\">見た目投資が組織力と企業価値を<br>高める理由 — 経営層向けレポート<\/div>\n        <\/div>\n        <div class=\"doc-preview-meta\">\n          <div><span class=\"lbl\">PAGES /<\/span>24<\/div>\n          <div><span class=\"lbl\">FORMAT /<\/span>PDF<\/div>\n          <div><span class=\"lbl\">PRICE /<\/span>FREE<\/div>\n        <\/div>\n      <\/div>\n    <\/div>\n    <div class=\"doc-content-col rv\">\n      <div class=\"doc-eye\">Free Document<\/div>\n      <h2 class=\"doc-title\">\n        組織改善と<br>企業価値向上の<span class=\"hl\">全体像<\/span>。\n      <\/h2>\n      <p class=\"doc-intro\">\n        社員の見た目を、<strong>組織改善と企業価値向上につなげる考え方<\/strong>をまとめた資料を無料でお送りします。<br>\n        統一感・基準づくり・企業価値向上のポイントを、まず資料でご確認ください。\n      <\/p>\n      <div class=\"doc-section-lbl\">この資料でわかること<\/div>\n      <ul class=\"doc-points\">\n        <li>社員の統一感が企業価値に与える影響<\/li>\n        <li>基準づくりで組織が変わる理由<\/li>\n        <li>福利厚生を文化とブランド資産に変える方法<\/li>\n      <\/ul>\n      <div class=\"doc-note\">\n        <div class=\"doc-note-i\">i<\/div>\n        <div>まずは資料で、組織改善と企業価値向上の全体像をご確認ください。<\/div>\n      <\/div>\n      <div class=\"doc-cta-wrap\">\n        <a href=\"#form\" class=\"btn-navy\">資料を受け取る →<\/a>\n        <p class=\"doc-cta-note\">フォーム送信後、自動返信メールで資料をお届けします<\/p>\n      <\/div>\n    <\/div>\n  <\/div>\n<\/section>\n\n<!-- ── FORM ── -->\n<section class=\"form-sec\" id=\"form\">\n  <div class=\"form-box\">\n    <div class=\"form-hd\">\n      <div class=\"form-eye\">Request Form<\/div>\n      <h2 class=\"form-title\">資料<br>ダウンロードフォーム<\/h2>\n      <p class=\"form-sub\">\n        必要事項をご記入の上、送信してください。<br>\n        自動返信メールにて、資料のダウンロードURLをお送りします。\n      <\/p>\n    <\/div>\n    <form id=\"reqForm\" onsubmit=\"handleSubmit(event)\">\n      <div class=\"f-row\">\n        <label class=\"f-label\">会社名<span class=\"req\">必須<\/span><\/label>\n        <input type=\"text\" class=\"f-input\" required=\"\" placeholder=\"株式会社○○○○\">\n      <\/div>\n      <div class=\"f-row\">\n        <label class=\"f-label\">お名前<span class=\"req\">必須<\/span><\/label>\n        <input type=\"text\" class=\"f-input\" required=\"\" placeholder=\"山田 太郎\">\n      <\/div>\n      <div class=\"f-row\">\n        <label class=\"f-label\">メールアドレス<span class=\"req\">必須<\/span><\/label>\n        <input type=\"email\" class=\"f-input\" required=\"\" placeholder=\"example@company.co.jp\">\n      <\/div>\n      <div class=\"f-row\">\n        <label class=\"f-label\">電話番号<span class=\"req\">必須<\/span><\/label>\n        <input type=\"tel\" class=\"f-input\" required=\"\" placeholder=\"03-0000-0000\">\n      <\/div>\n      <div class=\"f-row\">\n        <label class=\"f-label\">現状の課題<span class=\"opt\">任意<\/span><\/label>\n        <textarea class=\"f-textarea\" placeholder=\"例：社員の身だしなみ基準が曖昧で、統一感がない\"><\/textarea>\n      <\/div>\n      <button type=\"submit\" class=\"f-submit\">資料を受け取る →<\/button>\n      <p class=\"f-privacy\">\n        送信前に<a href=\"#\">プライバシーポリシー<\/a>をご確認ください。<br>\n        ご入力情報は資料送付と関連情報のご案内にのみ使用します。\n      <\/p>\n    <\/form>\n    <div class=\"f-success\" id=\"formSuccess\">\n      <div class=\"f-success-icon\">✓<\/div>\n      <h3 class=\"f-success-title\">送信ありがとうございます<\/h3>\n      <p class=\"f-success-text\">\n        ご登録のメールアドレスに、<br>資料のダウンロードURLをお送りしました。<br>\n        <span style=\"font-size:12px;color:var(--ink-m);display:block;margin-top:8px\">届かない場合は迷惑メールフォルダをご確認ください<\/span>\n      <\/p>\n    <\/div>\n  <\/div>\n<\/section>\n\n<footer class=\"footer\">© BOND TAILOR — produced by LBR Inc. &nbsp;|&nbsp; ORG × CORPORATE BRANDING<\/footer>\n\n<div class=\"mob-cta\">\n  <a href=\"#form\">資料を受け取る<\/a>\n<\/div>\n\n<script>\nconst obs = new IntersectionObserver(entries => {\n  entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('on'); });\n}, { threshold: 0.1, rootMargin: '0px 0px -36px 0px' });\ndocument.querySelectorAll('.rv').forEach(el => {\n  const parent = el.closest('.prob-list,.svc-grid,.why-grid,.benefit-cards,.cases-grid');\n  if(parent){\n    const idx = [...parent.querySelectorAll('.rv')].indexOf(el);\n    el.style.transitionDelay = `${idx * 0.07}s`;\n  }\n  obs.observe(el);\n});\nfunction handleSubmit(e) {\n  e.preventDefault();\n  document.getElementById('reqForm').style.display = 'none';\n  document.getElementById('formSuccess').classList.add('show');\n  window.scrollTo({ top: document.getElementById('form').offsetTop - 80, behavior: 'smooth' });\n}\n<\/script>\n\n\n<\/body><\/html>"</script>
